<svg width="1080" height="480" viewBox="0 0 1080 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Šváb Pi LSP and memory preview</title>
  <desc id="desc">Visualization of LSP code intelligence tools and workspace memory save/recall flow.</desc>

  <rect width="1080" height="480" rx="28" fill="#0B1020"/>

  <!-- Terminal chrome -->
  <rect x="38" y="36" width="1004" height="408" rx="24" fill="#101827" stroke="#334155"/>
  <rect x="38" y="36" width="1004" height="48" rx="24" fill="#1E293B"/>
  <circle cx="70" cy="60" r="7" fill="#EF4444"/>
  <circle cx="94" cy="60" r="7" fill="#F59E0B"/>
  <circle cx="118" cy="60" r="7" fill="#22C55E"/>
  <text x="150" y="67" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">lsp + workspace-memory</text>

  <!-- LSP Section -->
  <text x="74" y="130" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800">LSP Code Intelligence</text>

  <!-- LSP tools grid -->
  <g transform="translate(58 150)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    <rect width="150" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="16" y="33" fill="#93C5FD">lsp_diagnostics</text>

    <rect x="166" width="170" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="182" y="33" fill="#93C5FD">lsp_goto_definition</text>

    <rect x="352" width="170" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="368" y="33" fill="#93C5FD">lsp_find_references</text>

    <rect x="538" width="130" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="554" y="33" fill="#93C5FD">lsp_symbols</text>

    <rect x="684" width="160" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="700" y="33" fill="#93C5FD">lsp_rename</text>

    <rect x="860" width="120" height="52" rx="12" fill="#020617" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="876" y="33" fill="#93C5FD">prepare_rename</text>
  </g>

  <!-- LSP commands -->
  <g transform="translate(58 220)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    <rect width="520" height="52" rx="14" fill="#020617" stroke="#334155"/>
    <text x="16" y="22" fill="#64748B">commands:</text>
    <text x="106" y="22" fill="#94A3B8">/lsp</text>
    <text x="150" y="22" fill="#94A3B8">/lsp status</text>
    <text x="256" y="22" fill="#94A3B8">/lsp install</text>
    <text x="362" y="22" fill="#94A3B8">/lsp warmup</text>
    <text x="16" y="42" fill="#64748B">40+ language server configs supported</text>
  </g>

  <!-- Memory Section -->
  <text x="58" y="310" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800">Workspace Memory</text>
  <text x="370" y="310" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Recall decisions across sessions</text>

  <!-- Memory flow -->
  <g transform="translate(58 330)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- Save -->
    <rect width="140" height="70" rx="14" fill="#020617" stroke="#34D399" stroke-width="1.5"/>
    <text x="16" y="30" fill="#86EFAC" font-size="14" font-weight="700">memory_save</text>
    <text x="16" y="50" fill="#94A3B8" font-size="11">bug fix · decision</text>

    <path d="M148 35H174" stroke="#34D399" stroke-width="1.5" opacity="0.5"/>

    <!-- Store -->
    <rect x="180" width="180" height="70" rx="14" fill="#020617" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="196" y="30" fill="#FDE68A" font-size="14" font-weight="700">~/.pi/agent/</text>
    <text x="196" y="50" fill="#94A3B8" font-size="11">scoped by workspace</text>

    <path d="M368 35H394" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>

    <!-- Recall -->
    <rect x="400" width="180" height="70" rx="14" fill="#020617" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="416" y="30" fill="#C4B5FD" font-size="14" font-weight="700">/memory search</text>
    <text x="416" y="50" fill="#94A3B8" font-size="11">recall into session</text>

    <path d="M588 35H614" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>

    <!-- Commands list -->
    <rect x="620" width="360" height="70" rx="14" fill="#020617" stroke="#334155"/>
    <text x="636" y="22" fill="#94A3B8" font-size="12">/memory list</text>
    <text x="742" y="22" fill="#94A3B8" font-size="12">show</text>
    <text x="790" y="22" fill="#94A3B8" font-size="12">save</text>
    <text x="838" y="22" fill="#94A3B8" font-size="12">delete</text>
    <text x="904" y="22" fill="#94A3B8" font-size="12">stats</text>
    <text x="636" y="50" fill="#64748B" font-size="11">Avoid repeating the same bug fix twice.</text>
  </g>

  <!-- Footer -->
  <text x="74" y="460" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">LSP tools are callable by the agent during any session. Memory persists across sessions for the same workspace.</text>
</svg>
