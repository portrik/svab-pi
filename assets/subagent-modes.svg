<svg width="1080" height="520" viewBox="0 0 1080 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Šváb Pi subagent modes</title>
  <desc id="desc">Visualization of four subagent modes: single, parallel, chain, and async.</desc>

  <rect width="1080" height="520" rx="28" fill="#0B1020"/>

  <!-- Title -->
  <text x="72" y="68" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">Subagent Orchestration</text>
  <text x="72" y="98" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Four execution modes for specialized pi subprocesses.</text>

  <!-- Single mode -->
  <g transform="translate(42 130)">
    <rect width="230" height="240" rx="20" fill="#0F172A" stroke="#22D3EE" stroke-width="2"/>
    <text x="20" y="36" fill="#67E8F9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">single</text>
    <text x="20" y="60" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">One focused task</text>
    <!-- Single agent illustration -->
    <rect x="20" y="86" width="190" height="60" rx="14" fill="#020617" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="56" y="124" fill="#E0F2FE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">agent</text>
    <!-- Result -->
    <path d="M115 146V170" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
    <circle cx="115" cy="184" r="16" fill="#020617" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="107" y="190" fill="#22D3EE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">✓</text>
    <text x="20" y="226" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">investigation, execution</text>
  </g>

  <!-- Parallel mode -->
  <g transform="translate(296 130)">
    <rect width="230" height="240" rx="20" fill="#0F172A" stroke="#A78BFA" stroke-width="2"/>
    <text x="20" y="36" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">parallel</text>
    <text x="20" y="60" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Independent workers</text>
    <!-- Three parallel agents -->
    <rect x="20" y="86" width="56" height="44" rx="10" fill="#020617" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="32" y="114" fill="#EDE9FE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">w1</text>
    <rect x="86" y="86" width="56" height="44" rx="10" fill="#020617" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="98" y="114" fill="#EDE9FE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">w2</text>
    <rect x="152" y="86" width="56" height="44" rx="10" fill="#020617" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="164" y="114" fill="#EDE9FE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">w3</text>
    <!-- Converge -->
    <path d="M48 130L115 168" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <path d="M115 130L115 168" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <path d="M180 130L115 168" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <rect x="60" y="168" width="110" height="36" rx="10" fill="#020617" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="82" y="192" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">merge</text>
    <text x="20" y="226" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">reviewers, explorers</text>
  </g>

  <!-- Chain mode -->
  <g transform="translate(550 130)">
    <rect width="230" height="240" rx="20" fill="#0F172A" stroke="#F97316" stroke-width="2"/>
    <text x="20" y="36" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">chain</text>
    <text x="20" y="60" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Sequential pipeline</text>
    <!-- Chain of agents -->
    <rect x="14" y="86" width="52" height="44" rx="10" fill="#020617" stroke="#F97316" stroke-opacity="0.4"/>
    <text x="26" y="114" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">a1</text>
    <path d="M66 108H78" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
    <rect x="82" y="86" width="52" height="44" rx="10" fill="#020617" stroke="#F97316" stroke-opacity="0.4"/>
    <text x="94" y="114" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">a2</text>
    <path d="M134 108H146" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
    <rect x="150" y="86" width="52" height="44" rx="10" fill="#020617" stroke="#F97316" stroke-opacity="0.4"/>
    <text x="162" y="114" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">a3</text>
    <!-- Output flows through -->
    <path d="M40 130V168" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
    <path d="M40 168H176V130" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
    <text x="58" y="164" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">output feeds next →</text>
    <text x="20" y="226" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">multi-step pipelines</text>
  </g>

  <!-- Async mode -->
  <g transform="translate(804 130)">
    <rect width="230" height="240" rx="20" fill="#0F172A" stroke="#34D399" stroke-width="2"/>
    <text x="20" y="36" fill="#86EFAC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">async</text>
    <text x="20" y="60" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Background + join later</text>
    <!-- Background agent -->
    <rect x="20" y="86" width="190" height="44" rx="10" fill="#020617" stroke="#34D399" stroke-opacity="0.4"/>
    <text x="36" y="114" fill="#86EFAC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">bg-agent</text>
    <text x="140" y="114" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">running…</text>
    <!-- Timeline -->
    <line x1="115" y1="142" x2="115" y2="196" stroke="#34D399" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <circle cx="115" cy="156" r="3" fill="#34D399" opacity="0.5"/>
    <circle cx="115" cy="176" r="3" fill="#34D399" opacity="0.5"/>
    <!-- Join point -->
    <rect x="40" y="196" width="150" height="36" rx="10" fill="#020617" stroke="#34D399" stroke-opacity="0.4"/>
    <text x="64" y="220" fill="#86EFAC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">wait / inspect</text>
    <text x="20" y="226" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">research, long tasks</text>
  </g>

  <!-- Bundled agents list -->
  <g transform="translate(42 400)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <rect width="996" height="88" rx="18" fill="#020617" stroke="#1E293B"/>
    <text x="22" y="30" fill="#94A3B8">Bundled agents:</text>
    <text x="160" y="30" fill="#22D3EE">explorer</text>
    <text x="250" y="30" fill="#A78BFA">planner</text>
    <text x="330" y="30" fill="#F97316">worker</text>
    <text x="410" y="30" fill="#34D399">validator</text>
    <text x="500" y="30" fill="#F59E0B">plan-compliance</text>
    <text x="640" y="30" fill="#EF4444">plan-worker</text>
    <text x="22" y="56" fill="#94A3B8">Review agents:</text>
    <text x="160" y="56" fill="#CBD5E1">bug ×2</text>
    <text x="240" y="56" fill="#CBD5E1">security ×2</text>
    <text x="360" y="56" fill="#CBD5E1">performance ×2</text>
    <text x="510" y="56" fill="#CBD5E1">test-coverage ×2</text>
    <text x="670" y="56" fill="#CBD5E1">consistency ×2</text>
    <text x="22" y="76" fill="#64748B">plus: feasibility, architecture, risk, dependency, user-value reviewers</text>
  </g>
</svg>
